# Smoke-test config: 2 train benchmarks, 1 test benchmark, fast model,
# very short HPO budget. Used to verify the pipeline end-to-end.

general:
  trainset_x_path:
    - db/ifu_output/MMU_func.pkl
    - db/ifu_output/cache_func.pkl
  testset_x_path:
    - db/ifu_output/csr_func.pkl
  y_path:
    - db/pwr/MMU_pwr.pkl
    - db/pwr/cache_pwr.pkl
    - db/pwr/csr_pwr.pkl
  y_label: "/Pc(openC906)"
  seed: 42

preprocessing:
  drop_zero_var: true
  train_val_test_ratio: [0.8, 0.1, 0.1]
  avg_wsize: 1

feature_selection:
  algorithm: pearson
  top_k: 50
  hyperparams:
    pearson: {}

regression:
  algorithm: ElasticNetCV
  intercept_on: true
  non_negative_coef_only: false
  hpo_timeout: 30
  hyperparams:
    ElasticNetCV: {n_alphas: 10, l1_ratio: [0.5], cv: 3}
